<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub — {{ code }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .mh-error {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
  }
  .mh-error h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: var(--gold);
    margin: 0;
  }
  .mh-error p { color: var(--muted); margin: 0 0 18px; }
  .mh-error a {
    color: #14100a;
    background: var(--gold);
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="mh-error">
    <h1>{{ code }}</h1>
    <p>{{ message }}</p>
    <a href="{{ url_for('index') }}">Back to MovieHub</a>
  </div>
</body>
</html>

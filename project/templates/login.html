{% extends "layout.html" %}

{% block title %}MovieHub — Log in{% endblock %}

{% block content %}
<div class="mh-auth-wrap">
  <div class="mh-auth-card">
    <h1>Welcome back</h1>
    <p class="mh-auth-sub">Log in to pick up your collection.</p>

    <form method="post" action="{{ url_for('login') }}">
      <label class="mh-field">
        <span>Username</span>
        <input type="text" name="username" placeholder="Your username" required autofocus>
      </label>
      <label class="mh-field">
        <span>Password</span>
        <input type="password" name="password" placeholder="••••••••" required>
      </label>
      <button type="submit" class="mh-save-btn">Log in</button>
    </form>

    <p class="mh-auth-switch">
      No account yet? <a href="{{ url_for('register') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
